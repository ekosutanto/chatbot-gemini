<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Herbal Chatbot - Gemini AI</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>🌿 Herbal Assistant</h1>
    <p style="text-align: center; color: #666; margin-top: -10px; margin-bottom: 15px;">
      Tanya tentang tanaman herbal, pengobatan, cara meracik, efek samping, dan dosis
    </p>
    <div id="chat-box" class="chat-box"></div>
    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Tanyakan tentang herbal..." autocomplete="off" required />
      <button type="submit">Kirim</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
